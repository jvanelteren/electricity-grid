{% extends "base.html" %}
{% block title %}{{ game.title }} — Electricity Grid{% endblock %}
{% block content %}
<section class="game-page">
  <h1>{{ game.title }}</h1>
  <p class="concept">{{ game.concept }}</p>

  <div class="level-toggle" role="group" aria-label="Difficulty level">
    <span class="level-toggle-label">Level</span>
    <button type="button" class="level-btn" id="level-explore" data-level="explore">Explore</button>
    <button type="button" class="level-btn" id="level-operate" data-level="operate">Operate</button>
    <span class="level-hint" id="level-hint"></span>
    <div class="game-medal" data-medal-slug="{{ game.slug }}" aria-label="Your medal for this game"></div>
  </div>

  <div class="scenario-intro" style="background: rgba(45, 125, 79, 0.1); border: 1px solid #2e7d4f; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; max-width: 70ch;">
    <p id="scenario-text" style="margin: 0; color: #e7ecf3; font-size: 0.95rem;"></p>
  </div>

  <div class="game-note" id="game-note"></div>

  <div class="game-stage">
    <!-- Day panel: bidding phase -->
    <div id="day-panel" class="day-panel">
      <h3 id="day-title"></h3>
      <div class="bidding-panel">
        <label>Your bids for this day:</label>
        <div class="bidding-slots" id="bidding-slots"></div>
      </div>

      <div class="game-buttons">
        <button id="submit-btn">Submit bids</button>
        <button id="reset-btn">Reset day</button>
      </div>
    </div>

    <!-- Day results panel -->
    <div id="day-results" class="day-results" hidden>
      <h3 id="day-results-title"></h3>
      <p id="day-results-body"></p>
      <div class="lesson" id="day-results-lesson"></div>
      <button id="next-day-btn">Next day →</button>
    </div>

    <!-- Campaign summary (after Day 4) -->
    <div id="campaign-summary" class="campaign-summary" hidden>
      <h3 id="campaign-title"></h3>
      <p id="campaign-body"></p>
      <button id="campaign-play-again">Play again</button>
    </div>
  </div>

  <!-- Supply curve chart (Operate only) -->
  <div id="supply-chart" class="supply-chart" hidden>
    <h3>Merit order (supply curve)</h3>
    <canvas id="merit-canvas" width="600" height="200"></canvas>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', path='js/market.js') }}"></script>
{% endblock %}
