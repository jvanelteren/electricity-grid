{% extends "base.html" %}
{% block title %}{{ game.title }} — Electricity Grid{% endblock %}
{% block content %}
<section class="game-page">
  <h1>{{ game.title }}</h1>
  <p class="concept">{{ game.concept }}</p>

  <div class="level-toggle" role="group" aria-label="Difficulty level">
    <span class="level-toggle-label">Level</span>
    <button type="button" class="level-btn" id="level-explore" data-level="explore">Explore</button>
    <button type="button" class="level-btn" id="level-operate" data-level="operate">Operate</button>
    <span class="level-hint" id="level-hint"></span>
    <div class="game-medal" data-medal-slug="{{ game.slug }}" aria-label="Your medal for this game"></div>
  </div>

  <div class="scenario-intro" style="background: rgba(45, 125, 79, 0.1); border: 1px solid #2e7d4f; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; max-width: 70ch;">
    <p id="scenario-text" style="margin: 0; color: #e7ecf3; font-size: 0.95rem;"></p>
  </div>

  <div class="game-note" id="game-note"></div>

  <div class="game-stage">
    <h3 id="round-title"></h3>

    <!-- Network map -->
    <div class="network-container">
      <canvas id="network-canvas" width="600" height="400" style="border: 1px solid #233247; border-radius: 6px;"></canvas>
    </div>

    <!-- Demand display -->
    <div class="demand-panel">
      <div class="gauge">
        <span class="gauge-label">Demand North</span>
        <span class="gauge-value" id="demand-north">0 MW</span>
      </div>
      <div class="gauge">
        <span class="gauge-label">Demand South</span>
        <span class="gauge-value" id="demand-south">0 MW</span>
      </div>
      <div class="gauge">
        <span class="gauge-label">Redispatch cost</span>
        <span class="gauge-value" id="redispatch-cost">€0/hr</span>
      </div>
    </div>

    <!-- Generation sliders -->
    <div class="generation-panel">
      <label for="wind-slider">Wind dispatch:</label>
      <div class="slider-container">
        <input type="range" id="wind-slider" min="0" max="400" step="10" value="200">
        <span id="wind-value">200 MW</span>
      </div>

      <label for="coal-slider">Coal dispatch:</label>
      <div class="slider-container">
        <input type="range" id="coal-slider" min="0" max="500" step="10" value="200">
        <span id="coal-value">200 MW</span>
      </div>
    </div>

    <!-- Control buttons -->
    <div class="game-buttons">
      <button id="start-btn">Run round</button>
      <button id="reset-btn">Reset</button>
    </div>

    <!-- Results panel -->
    <div id="round-results" class="round-results" hidden>
      <h3 id="results-title"></h3>
      <p id="results-body"></p>
      <div class="lesson" id="results-lesson"></div>
      <button id="next-round-btn" hidden>Next round →</button>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', path='js/transmission.js') }}"></script>
{% endblock %}
