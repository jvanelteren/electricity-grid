<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Electricity Course{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">⚡ Electricity Course</a>
    <nav class="site-nav">
      <a href="/">Games</a>
      <a href="/learn">Learn</a>
    </nav>
    <p class="tagline">Learn how the power system works — by playing with it.</p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <a href="/">All games</a>
  </footer>
  <script src="{{ url_for('static', path='js/glossary.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
